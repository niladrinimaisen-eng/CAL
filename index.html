<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Simple Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    section {
      padding: 40px;
      text-align: center;
    }
    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    .btn {
      background: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }
    .form-container {
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Website</h1>
  </header>

  <section>
    <h2>About Me</h2>
    <p>This is my first website. You can customize this however you want.</p>
    <button class="btn" onclick="alert('Thanks for visiting!')">Click Me</button>

    <div class="form-container">
      <h2>Contact Form</h2>
    <iframe id="myFrame" width="100%" height="500"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (token) {
    const iframeUrl = `https://targetsite.com?token=${token}`;
    document.getElementById("myFrame").src = iframeUrl;
  }
</script>
    </div>
  </section>

  <footer>
    <p>© 2026 My Website</p>
  </footer>
</body>
</html>
